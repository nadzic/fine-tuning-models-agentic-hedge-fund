# --- Model and data paths ---
model_name: BAAI/bge-reranker-v2-m3        # Base pretrained reranker checkpoint from Hugging Face.
train_file: data/processed/train.jsonl     # JSONL file with training rows: query, passage, label, (optional qid).
valid_file: null                           # Optional explicit validation file; null means split from train_file.
output_dir: outputs/bge-reranker-v2-m3-finance  # Directory where checkpoints, logs, and final adapter are saved.

# --- Core training hyperparameters ---
max_length: 512                            # Max token length for (query, passage) pair after tokenization/truncation.
per_device_train_batch_size: 8             # Number of examples per forward pass on each device during training.
per_device_eval_batch_size: 16             # Number of examples per forward pass on each device during evaluation.
gradient_accumulation_steps: 2             # Accumulate gradients across N steps to simulate a larger effective batch.
learning_rate: 2e-4                        # Optimizer step size; higher trains faster but can destabilize learning.
num_train_epochs: 2                        # How many full passes over the training set.
warmup_ratio: 0.1                          # Fraction of total steps used to ramp LR from 0 to learning_rate.
weight_decay: 0.01                         # L2 regularization on weights to reduce overfitting.
seed: 42                                   # Random seed for reproducibility (split, shuffling, init randomness).

# --- Logging / evaluation / checkpoint cadence ---
logging_steps: 10                          # Print training logs every N update steps.
eval_steps: 100                            # Run validation every N update steps.
save_steps: 100                            # Save checkpoint every N update steps.

# --- LoRA / QLoRA adaptation hyperparameters ---
full_finetuning: false                     # If true, train all model weights; if false, train LoRA adapters only.
use_4bit: true                             # Use 4-bit quantized loading (QLoRA style) for lower VRAM usage.
lora_r: 16                                 # LoRA rank: adapter capacity; larger = more trainable parameters.
lora_alpha: 32                             # LoRA scaling factor; controls adapter update magnitude.
lora_dropout: 0.05                         # Dropout in LoRA adapters for regularization.
use_gradient_checkpointing: "unsloth"      # "unsloth", true, or false; reduces memory usage for larger batches.
optim: adamw_8bit                          # Optimizer choice; 8-bit AdamW is memory-efficient on GPU.
lora_target_modules:                       # Internal encoder modules where LoRA adapters are injected.
  - key
  - query
  - dense
  - value

# --- Validation split behavior ---
valid_split_ratio: 0.2                     # If valid_file is null, reserve this fraction of train_file for validation.